<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Starter Template</title>
    
    <link rel="stylesheet" href="../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../node_modules/@fortawesome/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="../../node_modules/animate.css/animate.min.css">
    
    <style>
        body { padding: 20px; background-color: #f8f9fa; }
        .welcome-card { max-width: 600px; margin: 50px auto; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card welcome-card shadow-sm animate__animated animate__fadeIn">
            <div class="card-body text-center">
                <i class="fas fa-brain fa-3x text-primary mb-3"></i>
                <h1 class="card-title h3">My Coding Brain Starter</h1>
                <p class="card-text text-muted">This template is ready with Bootstrap, FontAwesome, and Animate.css.</p>
                <button class="btn btn-primary">Let's Build Something!</button>
            </div>
        </div>
    </div>

    <script src="../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
